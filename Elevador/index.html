<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Elevador</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>ELEVADOR</h1>

<div class="layout">

  <!-- ELEVADOR -->
  <div class="machine">
    <div id="shaft">
      <div id="elevador">
        <div id="porta-esq"></div>
        <div id="porta-dir"></div>
        <div id="gato">🐱</div>
      </div>
    </div>

    <div class="controls">
      <button onclick="chamar(0)">T</button>
      <button onclick="chamar(1)">1</button>
      <button onclick="chamar(2)">2</button>
      <button onclick="chamar(3)">3</button>
      <button onclick="abrirDiagrama()">Abrir Diagrama</button>
      <button onclick="exibirDOT()">Gerar DOT</button>
    </div>

    <div id="status"></div>
  </div>

  <!-- LOG -->
  <div class="panel">
    <h3>📟 LOG</h3>
    <div id="log"></div>
  </div>

  <!-- PILHA -->
  <div class="panel">
    <h3> PILHA</h3>
    <div id="pilha"></div>
    <div id="ultimo-selecionado" class="ultimo-selecionado">Último chamado: -</div>
  </div>

  <!-- DOT OUTPUT -->
  <div class="panel">
    <h3>DOT</h3>
    <pre id="dotOutput" class="dot-output" style="display:none; white-space: pre-wrap; text-align:left;"></pre>
  </div>

  </div>



<!-- ordem IMPORTANTE -->
<script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>
<script src="elevador.js"></script>

</body>
</html>
